<div class="space-y-8">
  <section class="text-center max-w-2xl mx-auto">
    <h1 class="text-3xl font-extrabold tracking-tight text-slate-900 sm:text-4xl">Report a Cyber Crime</h1>
    <p class="mt-4 text-lg text-slate-600">Your report helps us track and shut down fraudulent activities. All submissions are encrypted and secure.</p>
  </section>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
    <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
      <h2 class="text-xl font-bold mb-6">Submit New Evidence</h2>
      <form class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-slate-700">Scam Category</label>
          <select class="mt-1 block w-full rounded-md border-slate-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">
            <option>Phishing</option>
            <option>Lottery Scam</option>
            <option>Investment Fraud</option>
            <option>Social Media Scam</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700">Description</label>
          <textarea rows="4" class="mt-1 block w-full rounded-md border-slate-300 shadow-sm focus:border-blue-500 focus:ring-blue-500" placeholder="Provide details about the incident..."></textarea>
        </div>
        <button type="submit" class="w-full bg-blue-700 text-white py-3 px-4 rounded-md font-semibold hover:bg-blue-800 transition">Submit Report</button>
      </form>
    </div>

    <div class="bg-slate-100 p-6 rounded-xl border border-slate-200">
      <h2 class="text-xl font-bold mb-4">Track a Complaint</h2>
      <p class="text-sm text-slate-600 mb-6">Enter your Reference Number to see the investigation progress.</p>
      <div class="flex gap-2">
        <input type="text" placeholder="REF-123456" class="flex-grow rounded-md border-slate-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">
        <button class="bg-slate-800 text-white px-4 py-2 rounded-md hover:bg-slate-900">Track</button>
      </div>
      
      <div class="mt-10 space-y-4 opacity-50">
        <div class="flex items-center gap-4">
          <div class="w-8 h-8 rounded-full bg-blue-600 text-white flex items-center justify-center text-xs">1</div>
          <p class="text-sm font-medium">Submitted</p>
        </div>
        <div class="flex items-center gap-4">
          <div class="w-8 h-8 rounded-full bg-slate-300 text-white flex items-center justify-center text-xs">2</div>
          <p class="text-sm font-medium text-slate-400">Under Investigation</p>
        </div>
      </div>
    </div>
  </div>
</div>
