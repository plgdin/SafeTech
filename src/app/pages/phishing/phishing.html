<section style="padding: 120px 24px; text-align: center; background: #fff; min-height: 80vh;">
  <h1 style="font-size: 48px; font-weight: 800; color: #020202; margin-bottom: 16px;">URL <span style="color: #1e6aff;">SAFEGUARD</span></h1>
  <p style="color: #666666; margin-bottom: 48px;">Advanced heuristic analysis and real-time threat detection.</p>

  <div style="max-width: 700px; margin: 0 auto; display: flex; gap: 12px;">
    <input type="text" [(ngModel)]="targetUrl" placeholder="Enter URL to scan..." 
           style="flex: 1; padding: 18px; border: 1px solid #e0e0e0; border-radius: 12px; font-size: 16px;">
    <button (click)='onCheck()' [disabled]="loading"
            style="background: #1e6aff; color: #fff; border: none; padding: 0 40px; border-radius: 12px; font-weight: 700; cursor: pointer;">
      {{ loading ? 'ANALYZING...' : 'CHECK URL' }}
    </button>
  </div>

  <div *ngIf="result" style="max-width: 700px; margin: 40px auto; padding: 32px; border-radius: 20px; border: 1px solid #f0f0f0; background: #fafafa; text-align: left;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
      <h3 style="margin: 0; font-size: 20px; color: #020202;">Scan Results</h3>
      <span [style.color]="result.score > 50 ? '#be123c' : '#059669'" style="font-weight: 800; font-size: 24px;">
        {{ result.score }}% Risk
      </span>
    </div>

    <div style="width: 100%; height: 12px; background: #e0e0e0; border-radius: 6px; margin-bottom: 24px; overflow: hidden;">
      <div [style.width.%]="result.score" 
           [style.background]="result.score > 70 ? '#be123c' : result.score > 30 ? '#f59e0b' : '#10b981'"
           style="height: 100%; transition: width 1s ease-in-out;"></div>
    </div>

    <div [style.background]="result.isSafe ? '#ecfdf5' : '#fff1f2'" 
         style="padding: 20px; border-radius: 12px; border: 1px solid;"
         [style.borderColor]="result.isSafe ? '#10b981' : '#be123c'">
      <p style="margin: 0; font-weight: 600;" [style.color]="result.isSafe ? '#065f46' : '#9f1239'">
        {{ result.isSafe ? 'No immediate threats confirmed.' : 'High probability of phishing detected.' }}
      </p>
      <p style="margin: 8px 0 0; font-size: 14px; color: #444;">{{ result.details }}</p>
    </div>
  </div>
</section>
