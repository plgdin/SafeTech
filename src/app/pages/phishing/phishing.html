<div class="max-w-3xl mx-auto text-center py-10">
  <h1 class="text-3xl font-bold text-slate-900 mb-4">Phishing Website Checker</h1>
  <p class="text-slate-600 mb-8">Paste a link below to check if it's safe or a potential scam.</p>

  <div class="flex gap-2 p-2 bg-white rounded-lg shadow-sm border border-slate-200">
    <input type="text" placeholder="https://example.com" class="flex-grow p-3 outline-none" #urlInput>
    <button (click)="checkUrl(urlInput.value)" class="bg-blue-600 text-white px-6 py-3 rounded-md font-medium">Scan URL</button>
  </div>

  <div class="mt-8 p-6 rounded-lg border-2 border-dashed border-slate-200">
    <p class="text-slate-400">Scan results will appear here...</p>
  </div>
</div>
